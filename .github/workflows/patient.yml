name: Build and Deploy Patient Service

on:
  push:
    branches:
      - main
    paths:
      - 'patient-service/**'
      - 'ecs/patient-task-def.json'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Set image tag
        id: tag
        run: echo "TAG=build-$(date +%s)" >> $GITHUB_ENV

      - name: Build and push Docker image
        run: |
          cd patient-service
          docker build -t patient-service:$TAG .
          docker tag patient-service:$TAG 373649774472.dkr.ecr.ap-south-1.amazonaws.com/patient-service:$TAG
          docker push 373649774472.dkr.ecr.ap-south-1.amazonaws.com/patient-service:$TAG

      - name: 🐞 Debug – Print task definition content
        run: cat ecs/patient-task-def.json

      - name: Render ECS task definition
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ecs/patient-task-def.json
          container-name: patient-service
          image: 373649774472.dkr.ecr.ap-south-1.amazonaws.com/patient-service:${{ env.TAG }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          cluster: dev-ecs-cluster
          service: patient-service
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          wait-for-service-stability: true

