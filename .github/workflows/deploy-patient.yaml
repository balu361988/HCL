name: Deploy Patient Service

on:
  push:
    branches:
      - main
    paths:
      - 'patient-service/**'
      - '.github/workflows/deploy-patient.yaml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v3

      - name: 🐳 Setup Docker
        uses: docker/setup-buildx-action@v3

      - name: 🔐 AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: 🔑 Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: 🛠️ Build & Push Docker Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t patient-service:latest ./patient-service
          docker tag patient-service:latest $ECR_REGISTRY/patient-service:latest
          docker push $ECR_REGISTRY/patient-service:latest

      - name: ⚙️ Terraform Deploy Infra
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: 📦 Terraform Init & Apply
        working-directory: terraform/environments/dev
        run: |
          terraform init
          terraform apply -auto-approve

