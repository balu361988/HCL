name: CI/CD for Appointment Service

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3

      - name: 🟢 Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: 🔑 Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: 🏗️ Build and Push Docker Image (appointment-service)
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t appointment-service:latest ./appointment-service
          docker tag appointment-service:latest $ECR_REGISTRY/appointment-service:latest
          docker push $ECR_REGISTRY/appointment-service:latest

      - name: ⚙️ Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: 📦 Terraform Init
        working-directory: terraform/environments/dev
        run: terraform init

      - name: 📄 Terraform Plan
        working-directory: terraform/environments/dev
        run: terraform plan

      - name: 🚀 Terraform Apply
        working-directory: terraform/environments/dev
        run: terraform apply -auto-approve

